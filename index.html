<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">   
</head>
<body>

  <!-- Licensing Screen (hidden while license disabled) -->
  <div id="license-screen" style="display:none;">
    <sp-heading>🔐 Activate License</sp-heading>
    <div class="input-wrap">
      <label for="emailInput">Email</label>
      <input id="emailInput" type="email" autocomplete="off" spellcheck="false" />
    </div>
    
    <div class="input-wrap">
      <label for="keyInput">License Key</label>
      <input id="keyInput" type="text" autocomplete="off" spellcheck="false" />
    </div>

    <sp-body id="licenseError" class="error-msg"></sp-body>

    <sp-button id="btnActivate">ACTIVATE</sp-button>
  </div>

  <!-- Main UI (shown by default while license disabled) -->
  <div id="main-ui">
    <img src="icons/STRIBE_logo.png" id="pluginLogo" />
    <sp-heading>Weekly Updates</sp-heading>

    <div class="league-display">
      <img id="leagueLogo" class="league-logo" alt="League logo" />
      <sp-body class="info-display">
        <span id="folderDisplay">Folder: Loading...</span>
        <span id="btnSelectFolder" class="button-link">(Browse)</span>
      </sp-body>
    </div>

    <sp-body id="status"></sp-body>

    <sp-label for="divisionInput">Division Selector (Abb):</sp-label>
    <div class="division-row">
      <sp-textfield id="divisionInput" value="ALL" placeholder="ALL"></sp-textfield>
      <sp-body id="divisionDisplay" class="division-display-inline">Division: ALL</sp-body>
    </div>

    <sp-checkbox id="allDivisionsCheckbox">
      Ignore Week
    </sp-checkbox>

    <sp-body class="info-display">
      <span id="weekDisplay">Week: -</span>
      <span id="btnRefreshWeek" class="button-link">(Refresh)</span>
    </sp-body>

    <div class="action-buttons">
      <button type="button" class="panel-action-btn" id="btnSchedule">SCHEDULE</button>
      <button type="button" class="panel-action-btn" id="btnStandings">STANDINGS</button>
      <button type="button" class="panel-action-btn" id="btnStats">STATS</button>
      <button type="button" class="panel-action-btn" id="btnHaveADay">HAVE-A-DAY</button>
      <button type="button" class="panel-action-btn" id="btnThumbnail">THUMBNAIL</button>
      <button type="button" class="panel-action-btn" id="btnActiveDivisions">ACTIVE DIVS</button>
      <button type="button" class="panel-action-btn" id="btnDivPreviews">DIV PREVIEWS</button>
      <button type="button" class="panel-action-btn" id="btnTeamsUpdate">TEAMS UPDATE</button>
    </div>
    <div class="export-cloud-row">
      <sp-checkbox id="exportToCloudCheckbox">
        Export to Cloud
      </sp-checkbox>
    </div>

    <sp-body class="info-display">v3.0.0</sp-body>
    <sp-body style="font-size:11px;opacity:0.6;margin-top:20px;">
      STRIBE MEDIA • © 2025
    </sp-body>
    
    <!-- Settings Menu -->
    <div class="settings-menu-container">
      <button id="settingsMenuButton" class="settings-menu-button" title="Settings">⋯</button>
      <div id="settingsMenu" class="settings-menu" style="display: none;">
        <button id="btnClearCache" class="settings-menu-item">Clear Logo Cache</button>
        <button id="btnLogout" class="settings-menu-item">Log Out</button>
      </div>
    </div>
    <br>
  </div>

  <script src="main.js"></script>
</body>
</html>
